<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - Image Management</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="forgot_password.js?v=1" defer></script>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-visual">
            <div class="brand-mark">
                <span class="dot"></span>
                <span>Image Management</span>
            </div>

            <div class="auth-hero">
                <h1>重置登录密码</h1>
                <p>输入用户名或邮箱，并设置新的密码。当前版本先提供站内直接重置能力，后续可继续接邮箱验证码或微信能力。</p>
            </div>

            <div class="visual-card">
                <div class="visual-window">
                    <div class="window-topbar">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="window-panel">
                        <div class="window-row sm"></div>
                        <div class="window-row lg"></div>
                        <div class="window-grid">
                            <div class="window-box"></div>
                            <div class="window-box"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="auth-form-pane">
            <div class="auth-header">
                <span class="eyebrow">找回密码</span>
                <h2>Reset your password</h2>
                <p>请填写账号标识和新的密码。重置成功后会跳转回登录页。</p>
            </div>

            <form id="forgot-password-form" class="auth-form">
                <div class="form-group full">
                    <label for="identifier">用户名或邮箱</label>
                    <div class="input-shell">
                        <span class="input-icon">@</span>
                        <input type="text" id="identifier" name="identifier" placeholder="请输入用户名或邮箱" required>
                    </div>
                </div>

                <div class="form-group full">
                    <label for="new-password">新密码</label>
                    <div class="input-shell">
                        <span class="input-icon">*</span>
                        <input type="password" id="new-password" name="new-password" placeholder="请输入新的密码" required>
                    </div>
                </div>

                <div class="form-group full">
                    <label for="confirm-password">确认新密码</label>
                    <div class="input-shell">
                        <span class="input-icon">*</span>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="请再次输入新的密码" required>
                    </div>
                </div>

                <button type="submit" class="primary-button">重置密码</button>
                <div id="error-message" class="error"></div>
            </form>

            <div class="auth-footer">
                想起密码了？<a href="login.html">返回登录</a>
            </div>
        </section>
    </main>
</body>
</html>
